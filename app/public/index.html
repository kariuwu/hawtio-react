<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="description" content="Hawtio React dev console" />

    <script>
      ;(() => {
        if (localStorage && window.matchMedia) {
          const saved = localStorage.getItem('hawtio.theme')
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          const theme = saved ?? (prefersDark ? 'dark' : 'light')
          if (theme === 'dark') {
            document.documentElement.classList.add('pf-v6-theme-dark')
          } else {
            document.documentElement.classList.remove('pf-v6-theme-dark')
          }
        }
      })()
    </script>

    <!-- Hawtio branding styles placeholder -->
    <link id="branding" rel="stylesheet" type="text/css" href="" />

    <title>Hawtio React dev</title>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
